services:

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pipeline_db
    ports:
      - "5432:5432"

  airflow:
    image: apache/airflow:2.9.1
    ports:
      - "8080:8080"
    volumes:
      - .:/opt/airflow
    environment:
      - AIRFLOW__CORE__EXECUTOR=SequentialExecutor
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
    command: >
      bash -c "
      airflow db migrate &&
      airflow users create
        --username admin
        --firstname Admin
        --lastname User
        --role Admin
        --email admin@example.com
        --password admin || true &&
      airflow webserver
      "
    depends_on:
      - postgres

volumes:
  postgres_data: